name: Lint Non-CSharp Files

on:
  pull_request:

jobs:
  biome:
    name: Biome (JS/TS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint JavaScript and TypeScript files with Biome
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find docs -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.cjs' -o -name '*.ts' -o -name '*.tsx' -o -name '*.jsx' \) -print0)

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No JS/TS files found."
            exit 0
          fi

          npx -y @biomejs/biome lint "${files[@]}"

  markdownlint:
    name: markdownlint-cli2 (MD/MDX)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint Markdown with markdownlint-cli2
        run: npx -y markdownlint-cli2

  cspell:
    name: cspell (spelling)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check spelling and terminology
        run: npx -y cspell lint --no-progress --relative "**/*.{md,mdx,yml,yaml,json}"

  vale:
    name: Vale (prose style)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Vale
        uses: vale-cli/vale-action@v2
        with:
          files: docs Readme.md .github/CONTRIBUTING.md

  yamllint:
    name: yamllint (YAML)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run yamllint
        run: |
          python -m pip install --upgrade pip
          pip install yamllint
          yamllint -c .yamllint.yml .

  actionlint:
    name: actionlint (GitHub Actions)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
          fail_level: error
