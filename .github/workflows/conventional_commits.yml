name: Conventional Commits

on:
  pull_request:
    branches: [ master, main, develop ]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - uses: wagoid/commitlint-github-action@v5
        with:
          configFile: '.commitlintrc.js'
