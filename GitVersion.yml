mode: Mainline
branches:
  main:
    regex: ^(master|main)$
    increment: Patch
    prevent-increment-of-merged-branch-version: true
    tag: ''
  develop:
    regex: ^develop$
    increment: Minor
    prevent-increment-of-merged-branch-version: true
    tag: alpha
    source-branches: [main]
  feature:
    regex: ^features?[/-]
    increment: Inherit
    tag: '{BranchName}'
    source-branches: [develop]
  hotfix:
    regex: ^hotfix(es)?[/-]
    increment: Patch
    tag: hotfix
    source-branches: [main]
